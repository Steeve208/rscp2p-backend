# Let's Encrypt PRODUCTION + DigitalOcean DNS-01 — wildcard certificates.
# Use when your DNS zone lives in DigitalOcean (common on DO Kubernetes).
# Requires Secret digitalocean-dns-token in namespace cert-manager.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns-digitalocean
  labels:
    app.kubernetes.io/name: rsc-gateway
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: LETSENCRYPT_EMAIL@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-dns-digitalocean-account-key
    solvers:
      - dns01:
          digitalocean:
            tokenSecretRef:
              name: digitalocean-dns-token
              key: access-token
