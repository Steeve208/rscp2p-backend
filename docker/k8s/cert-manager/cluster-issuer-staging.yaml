# Let's Encrypt STAGING — use first to validate DNS/Ingress before production certs.
# Requires cert-manager: https://cert-manager.io/docs/installation/
#
# Replace LETSENCRYPT_EMAIL with a real mailbox (Let's Encrypt account / expiry notices).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/name: rsc-gateway
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: LETSENCRYPT_EMAIL@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
