# Let's Encrypt PRODUCTION — HTTP-01 (single hostname, e.g. api.example.com).
# For wildcard (*.example.com) use cluster-issuer-dns-cloudflare-prod.yaml or
# cluster-issuer-dns-digitalocean-prod.yaml + certificate-wildcard.yaml.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: rsc-gateway
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: LETSENCRYPT_EMAIL@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
