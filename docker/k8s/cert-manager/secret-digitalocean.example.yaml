# DigitalOcean personal access token with DNS read/write scope.
#
#   kubectl create secret generic digitalocean-dns-token -n cert-manager \
#     --from-literal=access-token='YOUR_DO_PAT'
#
apiVersion: v1
kind: Secret
metadata:
  name: digitalocean-dns-token
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: rsc-gateway
type: Opaque
stringData:
  access-token: "REPLACE_WITH_DIGITALOCEAN_PAT"
