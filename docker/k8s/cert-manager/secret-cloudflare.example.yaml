# Cloudflare API token for DNS-01 (wildcard certs).
# Create token: Zone → DNS → Edit, Zone → Zone → Read (single zone).
#
#   kubectl create secret generic cloudflare-api-token -n cert-manager \
#     --from-literal=api-token='YOUR_CLOUDFLARE_API_TOKEN'
#
# Or apply this file after replacing the token (do not commit real values).
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: rsc-gateway
type: Opaque
stringData:
  api-token: "REPLACE_WITH_CLOUDFLARE_API_TOKEN"
