# Let's Encrypt PRODUCTION + Cloudflare DNS-01 — wildcard certificates.
# Requires Secret cloudflare-api-token in namespace cert-manager.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns-cloudflare
  labels:
    app.kubernetes.io/name: rsc-gateway
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: LETSENCRYPT_EMAIL@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-dns-cloudflare-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
