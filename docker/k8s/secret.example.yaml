# Template — copy to secret.yaml (gitignored) or use External Secrets / Sealed Secrets.
# kubectl create secret generic rsc-gateway -n rsc-gateway --from-env-file=.env.prod
apiVersion: v1
kind: Secret
metadata:
  name: rsc-gateway
  namespace: rsc-gateway
  labels:
    app.kubernetes.io/name: rsc-gateway
type: Opaque
stringData:
  DATABASE_URL: "postgres://USER:PASS@HOST:5432/gateway"
  REDIS_URL: "redis://:PASS@redis:6379"
  JWT_SECRET: "replace-with-32+-char-secret"
  MFA_ENCRYPTION_KEY: "replace-with-32+-char-key"
  RSC_RPC_URL: "https://rpc.example.com"
  RSC_WS_URL: "wss://ws.example.com"
  RAMP_API_KEY: ""
  TRANSAK_API_KEY: ""
