# Staging certificate — browser will show untrusted (fake CA). For integration tests only.
# Set spec.dnsNames[0] to your real hostname before apply.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rsc-gateway-tls-staging
  namespace: rsc-gateway
  labels:
    app.kubernetes.io/name: rsc-gateway
spec:
  secretName: rsc-gateway-tls-staging
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  dnsNames:
    - api.example.com
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - digital signature
    - key encipherment
