apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsc-gateway
  namespace: rsc-gateway
  labels:
    app.kubernetes.io/name: rsc-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rsc-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rsc-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: gateway
          image: registry.example.com/rsc-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rsc-gateway
            - secretRef:
                name: rsc-gateway
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      terminationGracePeriodSeconds: 30
