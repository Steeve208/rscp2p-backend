# HTTPS Ingress — TLS secret issued by cert-manager (see certificate.yaml).
# Prerequisites:
#   - NGINX Ingress Controller (ingressClassName: nginx)
#   - cert-manager + ClusterIssuer letsencrypt-prod
#   - DNS for spec.tls.hosts pointing to the Ingress LB
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rsc-gateway
  namespace: rsc-gateway
  labels:
    app.kubernetes.io/name: rsc-gateway
  annotations:
    # TLS / ACME (Certificate CR owns issuance; optional shim if you remove certificate.yaml):
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-max-age: "31536000"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.example.com
      secretName: rsc-gateway-tls
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rsc-gateway
                port:
                  number: 80
