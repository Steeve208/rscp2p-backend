# Reverse proxy → rsc-gateway (Axum).
# TLS termination: use DigitalOcean Load Balancer, cert-manager Ingress, or DO App Platform.

upstream gateway_backend {
    server gateway:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    # Liveness via edge (optional; K8s can probe gateway pod directly)
    location = /health/live {
        access_log off;
        proxy_pass http://gateway_backend/health/live;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health/ready {
        access_log off;
        proxy_pass http://gateway_backend/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Prometheus — restrict in production (allow private ranges only)
    location = /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://gateway_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
