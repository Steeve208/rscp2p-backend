# Fail CI if secret files are tracked — .env must never reach GitHub.
name: Guard secrets

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  no-env-in-git:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed .env files
        run: |
          set -euo pipefail
          BLOCKED=$(git ls-files '.env' '.env.*' 2>/dev/null | grep -v '.env.example$' || true)
          if [ -n "$BLOCKED" ]; then
            echo "::error::Secret env files must not be committed:"
            echo "$BLOCKED"
            exit 1
          fi
          echo "OK — no .env files in git index"
